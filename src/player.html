<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{TEXT}} — konid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Outfit', sans-serif;
      font-weight: 300;
      background: #f4f1eb;
      color: #2c2825;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle paper texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
      max-width: 640px;
      margin: 0 auto;
      width: 100%;
    }

    /* Brand mark */
    .mark {
      font-family: 'DM Serif Display', Georgia, serif;
      font-size: 0.8rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: #9e9589;
      margin-bottom: 4rem;
    }

    .mark a {
      color: inherit;
      text-decoration: none;
    }

    .mark a:hover {
      color: #6b6560;
    }

    /* The word — hero */
    .word {
      font-size: clamp(3.5rem, 12vw, 7rem);
      font-weight: 400;
      line-height: 1.1;
      text-align: center;
      letter-spacing: 0.02em;
      margin-bottom: 1.2rem;
      color: #1a1715;
    }

    /* Translation */
    .translation {
      font-family: 'DM Serif Display', Georgia, serif;
      font-style: italic;
      font-size: 1.3rem;
      color: #7a736b;
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .meta {
      font-size: 0.75rem;
      color: #b5aea6;
      letter-spacing: 0.05em;
      margin-bottom: 4rem;
      text-align: center;
    }

    /* Player bar */
    .player {
      width: 100%;
      max-width: 360px;
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .play-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 1.5px solid #c4bdb4;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .play-btn:hover {
      border-color: #8b8379;
      background: rgba(0,0,0,0.02);
    }

    .play-btn svg {
      width: 18px;
      height: 18px;
      fill: #6b6560;
      margin-left: 2px;
    }

    .play-btn.playing svg { margin-left: 0; }
    .play-btn .icon-pause { display: none; }
    .play-btn.playing .icon-play { display: none; }
    .play-btn.playing .icon-pause { display: block; }

    .play-btn.playing {
      border-color: #c0522e;
      background: #c0522e;
    }

    .play-btn.playing svg {
      fill: #f4f1eb;
    }

    .track {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .progress {
      width: 100%;
      height: 2px;
      background: #ddd8d1;
      border-radius: 1px;
      cursor: pointer;
      position: relative;
    }

    .progress-fill {
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      background: #c0522e;
      border-radius: 1px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .time {
      font-size: 0.7rem;
      color: #b5aea6;
      font-variant-numeric: tabular-nums;
    }

    /* Download */
    .download {
      font-size: 0.8rem;
      color: #9e9589;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: all 0.15s;
      margin-bottom: 4rem;
    }

    .download:hover {
      color: #6b6560;
      border-bottom-color: #6b6560;
    }

    /* Decorative line */
    .rule {
      width: 40px;
      height: 1px;
      background: #d4cfc8;
      margin-bottom: 1.5rem;
    }

    /* Footer */
    .footer {
      font-size: 0.7rem;
      color: #b5aea6;
      text-align: center;
    }

    .footer a {
      color: #9e9589;
      text-decoration: none;
    }

    .footer a:hover {
      color: #6b6560;
    }

    @media (max-width: 480px) {
      .page { padding: 2rem 1.5rem; }
      .mark { margin-bottom: 3rem; }
      .meta { margin-bottom: 3rem; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="mark"><a href="https://github.com/robertnowell/konid-language-learning">konid</a><br><span style="font-family: 'Outfit', sans-serif; font-size: 0.6rem; letter-spacing: 0.15em; font-weight: 300; color: #b5aea6;">language expression coach</span></div>

    <div class="word">{{TEXT}}</div>
    <div class="translation">{{MEANING}}</div>
    <div class="meta">{{VOICE}} · {{SPEED}}</div>

    <div class="player">
      <button class="play-btn" id="playBtn">
        <svg class="icon-play" viewBox="0 0 24 24"><polygon points="6,3 20,12 6,21"/></svg>
        <svg class="icon-pause" viewBox="0 0 24 24"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
      </button>
      <div class="track">
        <div class="progress" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time" id="time">0:00</div>
      </div>
    </div>

    <a class="download" href="{{AUDIO_URL}}" download>download mp3</a>

    <div class="rule"></div>

    <div class="footer">
      <a href="https://github.com/robertnowell/konid-language-learning">language expression coach</a>
    </div>
  </div>

  <audio id="audio" src="{{AUDIO_URL}}" preload="auto"></audio>

  <script>
    const audio = document.getElementById('audio');
    const playBtn = document.getElementById('playBtn');
    const progressFill = document.getElementById('progressFill');
    const progressBar = document.getElementById('progressBar');
    const timeEl = document.getElementById('time');

    function fmt(s) {
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    playBtn.addEventListener('click', () => {
      if (audio.paused) {
        audio.play();
        playBtn.classList.add('playing');
      } else {
        audio.pause();
        playBtn.classList.remove('playing');
      }
    });

    audio.addEventListener('timeupdate', () => {
      if (audio.duration) {
        progressFill.style.width = (audio.currentTime / audio.duration * 100) + '%';
        timeEl.textContent = fmt(audio.currentTime) + ' / ' + fmt(audio.duration);
      }
    });

    audio.addEventListener('ended', () => {
      playBtn.classList.remove('playing');
      progressFill.style.width = '0%';
    });

    progressBar.addEventListener('click', (e) => {
      if (audio.duration) {
        const rect = progressBar.getBoundingClientRect();
        audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
      }
    });

    audio.play().then(() => playBtn.classList.add('playing')).catch(() => {});
  </script>
</body>
</html>
